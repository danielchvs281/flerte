<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Yasmin</title>
<style>
  :root{
    --pink:#ff5c8a;
    --orange:#ff9d5c;
    --yellow:#ffd166;
    --purple:#a05cff;
    --cream:#fff8f0;
    --ink:#3a2140;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Segoe UI',system-ui,sans-serif;
    background:linear-gradient(135deg,var(--pink),var(--orange),var(--yellow));
    background-size:300% 300%;
    animation:gradientMove 12s ease infinite;
    overflow:hidden;
    position:relative;
  }
  @keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }
  .card{
    background:var(--cream);
    border-radius:32px;
    padding:3rem 2.5rem;
    max-width:520px;
    text-align:center;
    box-shadow:0 20px 60px rgba(160,92,255,0.35);
    position:relative;
    z-index:2;
    transform:scale(0.9);
    animation:pop 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes pop{to{transform:scale(1);}}
  h1{
    font-family:'Comic Sans MS','Segoe UI',cursive,sans-serif;
    font-size:2.4rem;
    color:var(--purple);
    margin-bottom:1rem;
  }
  p{
    font-size:1.15rem;
    color:var(--ink);
    line-height:1.6;
    margin-bottom:0.6rem;
  }
  .signature{
    margin-top:1.5rem;
    font-weight:bold;
    color:var(--pink);
    font-size:1.1rem;
  }
  .hearts span{
    position:absolute;
    font-size:1.5rem;
    opacity:0.85;
    animation:float 6s linear infinite;
    z-index:1;
  }
  @keyframes float{
    0%{transform:translateY(0) rotate(0deg);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(-100vh) rotate(360deg);opacity:0;}
  }
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="card">
  <h1>Yasmin 💛</h1>
  <p>Tem gente que ilumina o dia só por existir.</p>
  <p>Com você, tudo fica mais leve, mais colorido e mais divertido.</p>
  <p>Essa página é só um jeito bobo de dizer: você é especial pra mim.</p>
  <div class="signature">Com carinho, sempre. 🧡</div>
</div>

<script>
  const container = document.getElementById('hearts');
  const emojis = ['💛','🧡','💗','✨','💫'];
  function spawnHeart(){
    const el = document.createElement('span');
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100 + 'vw';
    el.style.animationDuration = (4 + Math.random()*4) + 's';
    el.style.fontSize = (1 + Math.random()*1.5) + 'rem';
    container.appendChild(el);
    setTimeout(()=>el.remove(), 8000);
  }
  setInterval(spawnHeart, 400);
</script>

</body>
</html>
